name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run static checks
        run: bun run ci
